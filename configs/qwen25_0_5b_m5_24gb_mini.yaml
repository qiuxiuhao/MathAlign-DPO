schema_version: "1.0"

project:
  name: mathalign-dpo
  run_mode: mini
  seed: 42
  description: >-
    Mac M5 24GB Mini pipeline for learning and end-to-end
    validation on Math-Step-DPO-10K with Qwen2.5-0.5B, PyTorch MPS,
    FP16 and LoRA.

model:
  name_or_path: model/Qwen2.5-0.5B-Instruct
  modelscope_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
  modelscope_revision: master
  remote_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
  revision: 7ae557604adf67be50417f59c2c2f167def9a775
  trust_remote_code: false
  torch_dtype: float16
  max_length: 2048
  use_cache: false
  gradient_checkpointing: true

quantization:
  enabled: false
  backend: none
  load_in_4bit: false
  quant_type: null
  use_double_quant: false
  compute_dtype: float16

lora:
  enabled: true
  rank: 8
  alpha: 16
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

data:
  dataset_name: xinlai/Math-Step-DPO-10K
  dataset_revision: 84a203c
  source_split: train
  train_samples: 256
  validation_samples: 32
  train_ratio: 0.8
  validation_ratio: 0.1
  evaluation_ratio: 0.1
  raw_dir: data/raw/Math-Step-DPO-10K
  processed_dir: data/Math-10K
  mini_dir: data/Math-10K/mini
  formal_dir: data/Math-10K/formal

preprocessing:
  normalize_line_endings: true
  strip_outer_whitespace: true
  max_consecutive_blank_lines: 2
  minimum_steps: 2
  require_final_answer_for_dpo: true
  filter_over_length: true
  truncate_over_length: false
  system_prompt: You are a careful mathematical reasoning assistant.
  user_instruction: >-
    Solve the following mathematics problem. Show a clear step-by-step
    derivation and put the final answer in \boxed{}.

negative_sampling:
  strategy: mixed
  allowed_strategies:
    - number_mutation
    - operator_mutation
    - mixed
  negatives_per_step: 1
  minimum_dpo_examples: 64
  maximum_dpo_examples: 256
  number_offset_choices:
    - -3
    - -2
    - -1
    - 1
    - 2
    - 3
  skip_unmutable_steps: true
  save_manual_review_samples: 50

sft:
  enabled: true
  output_dir: outputs/mini/sft
  learning_rate: 0.0002
  num_train_epochs: 1
  max_steps: 30
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  optimizer: adamw_torch
  lr_scheduler_type: cosine
  packing: false
  eval_strategy: steps
  eval_steps: 10
  save_strategy: steps
  save_steps: 15
  save_total_limit: 2
  logging_steps: 1
  adapter_reload_samples: 3
  adapter_reload_max_new_tokens: 96

dpo:
  enabled: true
  dataset_dir: data/Math-10K/mini/dpo
  output_dir: outputs/mini/dpo
  train_samples: 256
  validation_samples: 32
  beta: 0.1
  loss_type: sigmoid
  learning_rate: 0.000005
  num_train_epochs: 1
  max_steps: 20
  max_length: 2048
  max_prompt_length: 1024
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  optimizer: adamw_torch
  lr_scheduler_type: cosine
  eval_strategy: "no"
  eval_steps: 10
  save_strategy: steps
  save_steps: 10
  save_total_limit: 2
  logging_steps: 1
  adapter_reload_samples: 1
  adapter_reload_max_new_tokens: 32

evaluation:
  output_dir: outputs/results/mini
  batch_size: 1
  max_new_tokens: 1024
  do_sample: false
  temperature: 0.0
  top_p: 1.0
  num_beams: 1
  samples: 50
  metrics:
    - answer_extraction_rate
    - exact_match_accuracy
    - invalid_output_rate
    - average_output_tokens
  model_stages:
    - base
    - sft
    - dpo

runtime:
  backend: mps
  device: mps
  require_single_device: true
  expected_device_name_contains: Apple
  mixed_precision: fp16
  dataloader_num_workers: 0
  pin_memory: false
  report_to: none
  log_peak_memory: true
  log_elapsed_time: true
  fail_on_backend_unavailable: true
  fail_on_zero_trainable_parameters: true
  allow_cpu_fallback: false

output:
  logs_dir: outputs/logs/mini
  figures_dir: outputs/figures/mini
  reports_dir: outputs/reports/mini
  overwrite_existing_run: false
  save_run_metadata: true
  save_software_versions: true
  save_git_commit: true

smoke_test:
  enabled_by_default: false
  train_samples: 64
  validation_samples: 16
  dpo_samples: 64
  max_steps: 10
  evaluation_samples: 16
