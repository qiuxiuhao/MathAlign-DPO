schema_version: "1.0"

project:
  name: mathalign-dpo
  run_mode: mini
  seed: 42
  description: >-
    Mac M5 24GB Mini pipeline for learning and end-to-end
    validation with Qwen2.5-0.5B, PyTorch MPS, FP16 and LoRA.

model:
  name_or_path: Qwen/Qwen2.5-0.5B-Instruct
  trust_remote_code: false
  torch_dtype: float16
  max_length: 512
  use_cache: false
  gradient_checkpointing: true

quantization:
  enabled: false
  backend: none
  load_in_4bit: false
  quant_type: null
  use_double_quant: false
  compute_dtype: float16

lora:
  enabled: true
  rank: 8
  alpha: 16
  dropout: 0.05
  bias: none
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj

data:
  dataset_name: AI-MO/NuminaMath-CoT
  dataset_revision: 9d8d210c9f6a36c8f3cd84045668c9b7800ef517
  source_split: train
  train_samples: 256
  validation_samples: 32
  evaluation_samples: 32
  train_ratio: 0.95
  validation_ratio: 0.025
  evaluation_ratio: 0.025
  raw_dir: data/raw
  processed_dir: data/processed
  normalized_train_file: data/processed/normalized_train.jsonl
  normalized_validation_file: data/processed/normalized_validation.jsonl
  normalized_eval_file: data/processed/normalized_eval.jsonl
  step_train_file: data/processed/step_train.jsonl
  step_validation_file: data/processed/step_validation.jsonl
  step_eval_file: data/processed/step_eval.jsonl
  sft_train_file: data/processed/sft_train.jsonl
  sft_validation_file: data/processed/sft_validation.jsonl
  dpo_train_file: data/processed/dpo_train.jsonl
  dpo_validation_file: data/processed/dpo_validation.jsonl
  eval_file: data/processed/eval.jsonl
  statistics_file: data/processed/data_statistics.json
  split_manifest_file: data/processed/split_manifest.json
  manual_review_file: data/processed/manual_review_preferences.jsonl

preprocessing:
  normalize_line_endings: true
  strip_outer_whitespace: true
  max_consecutive_blank_lines: 2
  minimum_steps: 2
  require_final_answer_for_dpo: true
  filter_over_length: true
  truncate_over_length: false
  system_prompt: You are a careful mathematical reasoning assistant.
  user_instruction: >-
    Solve the following mathematics problem. Show a clear step-by-step
    derivation and put the final answer in \boxed{}.

negative_sampling:
  strategy: mixed
  allowed_strategies:
    - number_mutation
    - operator_mutation
    - mixed
  negatives_per_step: 1
  minimum_dpo_examples: 64
  maximum_dpo_examples: 256
  number_offset_choices:
    - -3
    - -2
    - -1
    - 1
    - 2
    - 3
  skip_unmutable_steps: true
  save_manual_review_samples: 50

sft:
  enabled: true
  output_dir: outputs/checkpoints/mini/sft
  learning_rate: 0.0002
  num_train_epochs: 1
  max_steps: 30
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  optimizer: adamw_torch
  lr_scheduler_type: cosine
  packing: false
  eval_strategy: steps
  eval_steps: 10
  save_strategy: steps
  save_steps: 15
  save_total_limit: 2
  logging_steps: 1

dpo:
  enabled: true
  output_dir: outputs/checkpoints/mini/dpo
  beta: 0.1
  loss_type: sigmoid
  learning_rate: 0.000005
  num_train_epochs: 1
  max_steps: 20
  max_length: 512
  max_prompt_length: 384
  per_device_train_batch_size: 1
  per_device_eval_batch_size: 1
  gradient_accumulation_steps: 4
  warmup_ratio: 0.03
  weight_decay: 0.0
  max_grad_norm: 1.0
  optimizer: adamw_torch
  lr_scheduler_type: cosine
  eval_strategy: steps
  eval_steps: 10
  save_strategy: steps
  save_steps: 10
  save_total_limit: 2
  logging_steps: 1

evaluation:
  output_dir: outputs/results/mini
  batch_size: 1
  max_new_tokens: 256
  do_sample: false
  temperature: 0.0
  top_p: 1.0
  num_beams: 1
  samples: 32
  metrics:
    - answer_extraction_rate
    - exact_match_accuracy
    - invalid_output_rate
    - average_output_tokens
  model_stages:
    - base
    - sft
    - dpo

runtime:
  backend: mps
  device: mps
  require_single_device: true
  expected_device_name_contains: Apple
  mixed_precision: fp16
  dataloader_num_workers: 0
  pin_memory: false
  report_to: none
  log_peak_memory: true
  log_elapsed_time: true
  fail_on_backend_unavailable: true
  fail_on_zero_trainable_parameters: true
  allow_cpu_fallback: false

output:
  logs_dir: outputs/logs/mini
  figures_dir: outputs/figures/mini
  reports_dir: outputs/reports/mini
  overwrite_existing_run: false
  save_run_metadata: true
  save_software_versions: true
  save_git_commit: true

smoke_test:
  enabled_by_default: false
  train_samples: 64
  validation_samples: 16
  dpo_samples: 32
  max_steps: 10
  evaluation_samples: 16
